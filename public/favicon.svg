<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cosmic-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Cosmic background with gradient border -->
  <circle cx="50" cy="50" r="44" fill="#090d16" stroke="url(#cosmic-grad)" stroke-width="3.5" />
  
  <!-- Outer orbiting ring -->
  <ellipse cx="50" cy="50" rx="30" ry="9" stroke="url(#cosmic-grad)" stroke-width="2.5" transform="rotate(-25 50 50)" stroke-dasharray="120 20" />
  
  <!-- Central glowing celestial body -->
  <circle cx="50" cy="50" r="14" fill="url(#cosmic-grad)" filter="url(#glow)" />
  
  <!-- Little sparkles/stars -->
  <path d="M28 32l1 2 2 1-2 1-1 2-1-2-2-1 2-1zM72 68l1 2 2 1-2 1-1 2-1-2-2-1 2-1z" fill="#ffffff" opacity="0.8" />
</svg>
